collectors:
  clien: false
  naver: false
  naver_issue: true
  ruliweb: false
  hackernews: true
  reddit: false
  github: false

naver_issue_urls:
  - "https://media.naver.com/issue/092/492"

grouper:
  min_cluster_size: 2
  min_samples: 2
  similarity_threshold: 0.92
indexer:
  embedding_dim: 1024
  embedding_model: BAAI/bge-m3
llm:
  auto_label_min_cluster_size: 4
  clickbait_keywords:
  - 이거
  - 저거
  - 결국
  - 드디어
  - 대박
  - 헐
  - 미쳤
  - 충격
  - 대체
  - 진짜
  - 실화
  - 역대급
  - this
  - finally
  - wtf
  - omg
  - holy
  - literally
  cohesion_threshold: 0.72
ranker:
  min_trend_score: 0.3
  top_n_issues: 5
  trend_score_weights:
    burst: 0.25
    cohesion: 0.1
    engagement: 0.2
    novelty: 0.05
    source_diversity: 0.15
    user_preference: 0.05
    volume: 0.2
